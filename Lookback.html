<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Opportunity Lookback</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --danger: #ef4444;
            --border: #334155;
            --blue: #3b82f6;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
        }

        .header-area { text-align: center; margin-bottom: 1.5rem; }
        .ticker-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; }
        .ticker-logo { width: 40px; height: 40px; border-radius: 8px; background: #334155; display: none; }
        .ticker-name-text { font-size: 1.4rem; font-weight: 700; margin: 0; }

        .input-group { display: grid; gap: 16px; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: var(--border); cursor: not-allowed; }

        #error { color: var(--danger); font-size: 0.875rem; margin-top: 1rem; display: none; text-align: center; }

        .results-section { margin-top: 2rem; display: none; border-top: 1px solid var(--border); padding-top: 1.5rem; }
        
        .section-label { 
            font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; 
            letter-spacing: 0.05em; margin-bottom: 12px; border-left: 3px solid var(--accent); padding-left: 8px;
        }
        .section-label.blue { border-left-color: var(--blue); }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem;
            text-align: center;
            margin-bottom: 12px;
        }

        .desc-card { text-align: left; font-size: 0.85rem; line-height: 1.5; color: var(--text-secondary); }

        .results-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; }
        .stat-sub { font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; display: block; }
        .highlight { color: var(--accent); }
        .highlight-blue { color: var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2 id="mainTitle">Stock Return Analysis</h2>
        <div id="tickerDetails" class="ticker-header" style="display:none;">
            <img id="compLogo" class="ticker-logo" src="" alt="">
            <p id="compName" class="ticker-name-text">—</p>
        </div>
    </div>
    
    <div class="input-group">
        <div>
            <label>Ticker Symbol</label>
            <input type="text" id="ticker" placeholder="e.g. AAPL, TSLA, BTC">
        </div>
        <div class="grid-2">
            <div><label>Start Date</label><input type="date" id="start"></div>
            <div><label>End Date</label><input type="date" id="end"></div>
        </div>
        <div>
            <label>Polygon.io API Key</label>
            <input type="password" id="apiKey" placeholder="Enter API Key">
        </div>
    </div>

    <button id="goBtn" onclick="fetchAndCalculate()">Analyze Performance</button>
    <div id="error"></div>

    <div id="results" class="results-section">
        <!-- COMPANY SUMMARY -->
        <div class="stat-card desc-card" id="compDescArea">
            <p id="compDescription">—</p>
            <p style="margin-top:8px; font-weight:600; font-size:0.75rem;" id="compExchange">—</p>
        </div>

        <!-- FULL PERIOD SECTION -->
        <div class="section-label blue">Timeframe (Buy & Hold)</div>
        <div class="results-row-3">
            <div class="stat-card">
                <p class="stat-label">Full Return</p>
                <p class="stat-value highlight-blue" id="fullGain">—</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Total Days</p>
                <p class="stat-value" id="fullDays">—</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Period APR</p>
                <p class="stat-value highlight-blue" id="fullAPR">—</p>
            </div>
        </div>

        <!-- PERFECT TRADE SECTION -->
        <div class="section-label">"Perfect" Trade (Low to Peak)</div>
        <div class="results-row-3">
            <div class="stat-card">
                <p class="stat-label">Low Entry</p>
                <p class="stat-value" id="resLowVal">—</p>
                <span class="stat-sub" id="resLowDate">—</span>
            </div>
            <div class="stat-card">
                <p class="stat-label">Peak Exit</p>
                <p class="stat-value" id="resHighVal">—</p>
                <span class="stat-sub" id="resHighDate">—</span>
            </div>
            <div class="stat-card">
                <p class="stat-label">Max Gain</p>
                <p class="stat-value highlight" id="resGain">—</p>
                <span class="stat-sub" id="resDaysLabel">—</span>
            </div>
        </div>
        
        <div class="stat-card">
            <p class="stat-label">Max Optimized APR</p>
            <p class="stat-value highlight" id="resAPR" style="font-size:1.4rem;">—</p>
        </div>
    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('polygon_api_key');
    if (savedKey) document.getElementById('apiKey').value = savedKey;
});

const today = new Date().toISOString().split('T')[0];
const thirtyAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
document.getElementById('start').value = thirtyAgo;
document.getElementById('end').value = today;

const formatDate = (ts) => new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit', timeZone: 'UTC' });

function calcAPR(gainPct, days) {
    if (days <= 0) return "0%";
    const apr = (Math.pow(1 + gainPct/100, 365/days) - 1) * 100;
    return apr > 99999 ? '>99,999%' : `${Math.round(apr).toLocaleString()}%`;
}

async function fetchAndCalculate() {
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  const start = document.getElementById('start').value;
  const end = document.getElementById('end').value;
  const apiKey = document.getElementById('apiKey').value.trim();
  const errEl = document.getElementById('error');
  const resultsArea = document.getElementById('results');
  const detailArea = document.getElementById('tickerDetails');
  
  errEl.style.display = 'none';
  resultsArea.style.display = 'none';
  detailArea.style.display = 'none';

  if (!apiKey || !ticker) { errEl.textContent = 'Ticker and API Key required.'; errEl.style.display='block'; return; }
  localStorage.setItem('polygon_api_key', apiKey);

  const btn = document.getElementById('goBtn');
  btn.textContent = 'Fetching...';
  btn.disabled = true;

  try {
    // 1. Fetch Ticker Details (v3)
    const detailUrl = `https://api.polygon.io/v3/reference/tickers/${ticker}?apiKey=${apiKey}`;
    const detailRes = await fetch(detailUrl);
    const detailData = await detailRes.json();

    if (detailData.results) {
        const info = detailData.results;
        document.getElementById('compName').textContent = info.name || ticker;
        document.getElementById('compDescription').textContent = info.description || "No description available.";
        document.getElementById('compExchange').textContent = `Primary Exchange: ${info.primary_exchange || 'N/A'}`;
        
        const logo = document.getElementById('compLogo');
        if (info.branding && info.branding.icon_url) {
            logo.src = `${info.branding.icon_url}?apiKey=${apiKey}`;
            logo.style.display = 'block';
        } else {
            logo.style.display = 'none';
        }
        detailArea.style.display = 'flex';
    }

    // 2. Fetch Aggregates (v2)
    const url = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${start}/${end}?adjusted=true&sort=asc&apiKey=${apiKey}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      errEl.textContent = 'No price data found for this range.';
      errEl.style.display = 'block';
      return;
    }

    const prices = data.results;

    // --- FULL PERIOD ---
    const firstPrice = prices[0].o; 
    const lastPrice = prices[prices.length - 1].c;
    const fullGainPct = ((lastPrice - firstPrice) / firstPrice) * 100;
    const fullDays = Math.max(1, Math.round((prices[prices.length-1].t - prices[0].t) / 86400000));
    
    document.getElementById('fullGain').textContent = `${fullGainPct >= 0 ? '+' : ''}${fullGainPct.toFixed(1)}%`;
    document.getElementById('fullDays').textContent = `${fullDays}d`;
    document.getElementById('fullAPR').textContent = calcAPR(fullGainPct, fullDays);

    // --- PERFECT TRADE ---
    let lowItem = prices[0], lowIndex = 0;
    prices.forEach((item, i) => { if (item.l < lowItem.l) { lowItem = item; lowIndex = i; } });

    const after = prices.slice(lowIndex);
    let highItem = after[0];
    after.forEach(item => { if (item.h > highItem.h) highItem = item; });

    const perfGainPct = ((highItem.h - lowItem.l) / lowItem.l) * 100;
    const perfDays = Math.max(1, Math.round((highItem.t - lowItem.t) / 86400000));

    document.getElementById('resLowVal').textContent = `$${lowItem.l.toFixed(2)}`;
    document.getElementById('resLowDate').textContent = formatDate(lowItem.t);
    document.getElementById('resHighVal').textContent = `$${highItem.h.toFixed(2)}`;
    document.getElementById('resHighDate').textContent = formatDate(highItem.t);
    document.getElementById('resGain').textContent = `+${perfGainPct.toFixed(1)}%`;
    document.getElementById('resDaysLabel').textContent = `over ${perfDays} days`;
    document.getElementById('resAPR').textContent = calcAPR(perfGainPct, perfDays);

    resultsArea.style.display = 'block';

  } catch(e) {
    errEl.textContent = 'Error fetching data. Check your API key limits.';
    errEl.style.display = 'block';
  } finally {
    btn.textContent = 'Analyze Performance';
    btn.disabled = false;
  }
}
</script>

</body>
</html>
